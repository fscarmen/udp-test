name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux
          - os: linux
            arch: amd64
            cc: x86_64-linux-gnu-gcc
            cc_pkg: gcc-x86-64-linux-gnu
            ext: ""
          - os: linux
            arch: arm64
            cc: aarch64-linux-gnu-gcc
            cc_pkg: gcc-aarch64-linux-gnu
            ext: ""
          - os: linux
            arch: "386"
            cc: i686-linux-gnu-gcc
            cc_pkg: gcc-i686-linux-gnu
            ext: ""
          - os: linux
            arch: arm
            cc: arm-linux-gnueabi-gcc
            cc_pkg: gcc-arm-linux-gnueabi
            ext: ""
          # Windows
          - os: windows
            arch: amd64
            cc: x86_64-w64-mingw32-gcc
            cc_pkg: gcc-mingw-w64-x86-64
            ext: ".exe"
          - os: windows
            arch: "386"
            cc: i686-w64-mingw32-gcc
            cc_pkg: gcc-mingw-w64-i686
            ext: ".exe"

    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.cc_pkg }}

      - name: Build udp-test (${{ matrix.os }}-${{ matrix.arch }})
        run: |
          OUTPUT="udp-test${{ matrix.ext }}"
          mkdir -p "build/${{ matrix.os }}_${{ matrix.arch }}"

          CFLAGS="-Wall -O2 -s"
          LIBS=""

          # -lws2_32 must come AFTER the source file (link order)
          if [ "${{ matrix.os }}" = "windows" ]; then
            LIBS="-lws2_32"
          fi

          ${{ matrix.cc }} $CFLAGS -static \
            -o "build/${{ matrix.os }}_${{ matrix.arch }}/${OUTPUT}" \
            src/udp-test.c $LIBS

          file "build/${{ matrix.os }}_${{ matrix.arch }}/${OUTPUT}"
          ls -lh "build/${{ matrix.os }}_${{ matrix.arch }}/${OUTPUT}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: udp-test-${{ matrix.os }}-${{ matrix.arch }}
          path: build/${{ matrix.os }}_${{ matrix.arch }}
          if-no-files-found: warn
          retention-days: 1

  # macOS builds need macOS runners (cross-compiling from Linux is impractical)
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v6

      - name: Build udp-test (macOS-${{ matrix.arch }})
        run: |
          OUTPUT="udp-test"
          mkdir -p "build/darwin_${{ matrix.arch }}"

          CFLAGS="-Wall -O2 -s"

          if [ "${{ matrix.arch }}" = "amd64" ]; then
            CFLAGS="$CFLAGS -arch x86_64"
          else
            CFLAGS="$CFLAGS -arch arm64"
          fi

          gcc $CFLAGS \
            -o "build/darwin_${{ matrix.arch }}/${OUTPUT}" \
            src/udp-test.c

          file "build/darwin_${{ matrix.arch }}/${OUTPUT}"
          ls -lh "build/darwin_${{ matrix.arch }}/${OUTPUT}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v7
        with:
          name: udp-test-darwin-${{ matrix.arch }}
          path: build/darwin_${{ matrix.arch }}
          if-no-files-found: warn
          retention-days: 1

  release:
    needs: [build, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: udp-test-*
          path: build

      - name: Create Archives
        run: |
          cd build
          for dir in */; do
            artifact_name=${dir%/}
            # Strip "udp-test-" prefix for platform tag
            platform=${artifact_name#udp-test-}
            cd "$artifact_name"
            chmod +x udp-test* 2>/dev/null || true
            tar czf "../../udp-test-${platform}.tar.gz" --mode='0755' "udp-test"*
            cd ..
          done

          ls -lh ../udp-test-*.tar.gz

      - name: Create Release
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            udp-test-*.tar.gz